# bot-metrics: дашборд (Flask на 8765) и /__deploy → deploy_listener (9876)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # GitHub-вебхук авто-деплоя — без basic auth, защищён секретом в URL
    location /__deploy/ {
        proxy_pass http://127.0.0.1:9876;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # Внешний API лид-бота — защищён LEADS_API_KEY в заголовке X-API-Key,
    # basic auth здесь не нужен (иначе сломаются внешние боты, которые
    # ходят сюда программно).
    location /api/external/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Дашборд + внутренний API — закрыты basic auth.
    # Файл паролей создаётся через tools/secure-dashboard.sh; install.sh
    # делает это автоматически при первой установке.
    location / {
        auth_basic "Bot metrics";
        auth_basic_user_file /etc/nginx/.htpasswd_bot_metrics;

        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
