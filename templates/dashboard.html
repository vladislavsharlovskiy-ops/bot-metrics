<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Бизнес-показатели</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; }
  .stage-lead_new       { background: #e8f0fe; color: #1967d2; }
  .stage-qualified      { background: #d2e3fc; color: #1857c4; }
  .stage-breakdown_sent { background: #fef7e0; color: #b06000; }
  .stage-agreed         { background: #fce8b2; color: #8a5a00; }
  .stage-paid           { background: #ceead6; color: #137333; }
  .stage-consulted      { background: #a8dab5; color: #0b6b32; }
  .stage-package_bought { background: #34a853; color: #ffffff; }
  .stage-lost           { background: #fad2cf; color: #b3261e; }
  .stage-ignoring       { background: #fff3e0; color: #ad6800; }
  .source-instagram { background: #fce4ec; color: #c2185b; }
  .source-youtube   { background: #ffebee; color: #d32f2f; }
  .source-telegram  { background: #e3f2fd; color: #1565c0; }
  .source-tiktok    { background: #e8eaf6; color: #1a1a1a; }
  .source-rutube    { background: #f3e5f5; color: #6a1b9a; }
  .source-vk        { background: #e1f5fe; color: #0277bd; }
  .scroll-fade::-webkit-scrollbar { width: 8px; }
  .scroll-fade::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
  /* ───── Воронка ───── */
  .funnel { display: flex; flex-direction: column; gap: 6px; padding: 8px 0; }
  .funnel-row {
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto; min-height: 40px;
    padding: 8px 14px; border-radius: 10px;
    color: #fff; font-weight: 600; font-size: 14px;
    transition: width 0.25s ease, background 0.25s ease;
    white-space: nowrap;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .funnel-row.empty { color: #94a3b8; background: #f1f5f9 !important; box-shadow: none; }
  .funnel-row .nm { opacity: 0.95; margin-right: 10px; }
  .funnel-row .ct { font-weight: 700; }
  .funnel-row .pc { opacity: 0.85; margin-left: 10px; font-weight: 500; font-size: 12px; }
</style>
</head>
<body class="bg-slate-50 text-slate-800" x-data="dash()" x-init="init()">

<div class="max-w-7xl mx-auto px-3 sm:px-6 py-4 sm:py-6">

  <!-- Header -->
  <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4 sm:mb-6">
    <div class="min-w-0">
      <h1 class="text-xl sm:text-3xl font-bold tracking-tight">Бизнес-показатели</h1>
      <p class="text-slate-500 text-xs sm:text-sm mt-0.5" x-text="todayLabel"></p>
    </div>
    <div class="flex gap-2">
      <button @click="refreshAll()" class="flex-1 sm:flex-none px-3 py-2 rounded-lg bg-white border border-slate-200 hover:bg-slate-100 text-sm font-medium flex items-center justify-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Обновить
      </button>
      <button @click="newLeadOpen = true" class="flex-1 sm:flex-none px-3 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium flex items-center justify-center gap-2 whitespace-nowrap">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Новый лид
      </button>
    </div>
  </header>

  <!-- Stats cards -->
  <section class="grid grid-cols-2 md:grid-cols-4 gap-2 sm:gap-4 mb-4 sm:mb-6">
    <template x-for="card in summaryCards" :key="card.label">
      <div class="bg-white rounded-xl border border-slate-200 p-3 sm:p-5 shadow-sm">
        <div class="text-slate-500 text-[10px] sm:text-xs font-medium uppercase tracking-wider leading-tight" x-text="card.label"></div>
        <div class="text-2xl sm:text-3xl font-bold mt-1 sm:mt-2" :class="card.color" x-text="card.value"></div>
        <div class="text-slate-400 text-[10px] sm:text-xs mt-0.5 sm:mt-1 leading-tight" x-text="card.hint"></div>
      </div>
    </template>
  </section>

  <!-- Charts row -->
  <section class="grid grid-cols-1 lg:grid-cols-2 gap-3 sm:gap-4 mb-4 sm:mb-6">
    <div class="bg-white rounded-xl border border-slate-200 p-3 sm:p-5 shadow-sm">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-3 sm:mb-4">
        <h2 class="text-base sm:text-lg font-semibold">Воронка</h2>
        <div class="flex gap-1 text-xs overflow-x-auto -mx-1 px-1">
          <button @click="setPeriod('today')" :class="period==='today' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'" class="px-3 py-1.5 rounded-md font-medium whitespace-nowrap">День</button>
          <button @click="setPeriod('week')"  :class="period==='week'  ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'" class="px-3 py-1.5 rounded-md font-medium whitespace-nowrap">Неделя</button>
          <button @click="setPeriod('month')" :class="period==='month' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'" class="px-3 py-1.5 rounded-md font-medium whitespace-nowrap">Месяц</button>
          <button @click="setPeriod('now')"   :class="period==='now'   ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'" class="px-3 py-1.5 rounded-md font-medium whitespace-nowrap">В работе</button>
        </div>
      </div>
      <div class="text-xs text-slate-500 mb-3" x-text="periodLabel"></div>
      <div x-show="!funnelHasData" class="text-center text-slate-400 text-sm py-8">
        Нет событий за этот период
      </div>
      <div x-show="funnelHasData" class="funnel">
        <template x-for="(s, i) in funnelView" :key="s.code">
          <div class="funnel-row" :class="s.count === 0 ? 'empty' : ''"
               :style="'width: ' + s.width + '%; background: ' + s.color + ';'"
               :title="s.tooltip">
            <span class="nm" x-text="s.short"></span>
            <span class="ct" x-text="s.count"></span>
            <span class="pc" x-text="s.label"></span>
          </div>
        </template>
      </div>
    </div>

    <div class="bg-white rounded-xl border border-slate-200 p-3 sm:p-5 shadow-sm">
      <h2 class="text-base sm:text-lg font-semibold mb-3 sm:mb-4">Каналы (за месяц)</h2>
      <div x-show="!channelsHaveData" class="text-center text-slate-400 text-sm py-6">
        Заявок за месяц ещё нет
      </div>
      <div x-show="channelsHaveData" class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 items-center">
        <div class="max-w-[220px] mx-auto w-full">
          <canvas id="channelsChart"></canvas>
        </div>
        <div class="space-y-2 text-sm">
          <template x-for="ch in channels.filter(c => c.leads > 0)" :key="ch.source">
            <div class="border-b border-slate-100 pb-2 last:border-0">
              <div class="font-medium" x-text="ch.title"></div>
              <div class="text-slate-500 text-xs flex justify-between">
                <span>Заявок: <b x-text="ch.leads"></b></span>
                <span>Оплат: <b x-text="ch.paid"></b></span>
              </div>
              <div class="text-slate-400 text-xs">
                Конверсия: <b x-text="(ch.conv_paid*100).toFixed(0) + '%'"></b>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </section>

  <!-- Months dynamics -->
  <section x-show="months.length" class="bg-white rounded-xl border border-slate-200 shadow-sm p-3 sm:p-5 mb-4 sm:mb-6">
    <h2 class="text-base sm:text-lg font-semibold mb-3 sm:mb-4">По месяцам</h2>
    <div class="overflow-x-auto -mx-3 sm:-mx-5 px-3 sm:px-5">
      <table class="w-full text-sm">
        <thead class="text-xs text-slate-500 uppercase tracking-wider">
          <tr class="border-b border-slate-100">
            <th class="text-left py-2 pr-3 font-medium">Месяц</th>
            <th class="text-right py-2 px-2 font-medium">Заявок</th>
            <th class="text-right py-2 px-2 font-medium">Оплат</th>
            <th class="text-right py-2 px-2 font-medium">Конв.</th>
            <th class="text-right py-2 pl-2 font-medium whitespace-nowrap">Выручка ₽</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="m in months" :key="m.year + '-' + m.month">
            <tr class="border-b border-slate-50 last:border-0">
              <td class="py-2 pr-3 font-medium" x-text="m.label"></td>
              <td class="py-2 px-2 text-right tabular-nums" x-text="m.leads"></td>
              <td class="py-2 px-2 text-right tabular-nums" x-text="m.paid"></td>
              <td class="py-2 px-2 text-right tabular-nums text-slate-500" x-text="m.leads ? (m.conv_paid*100).toFixed(0)+'%' : '—'"></td>
              <td class="py-2 pl-2 text-right tabular-nums font-medium" x-text="formatMoney(m.revenue_total)"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
    <div class="text-xs text-slate-400 mt-2">Показаны только месяцы с заявками или оплатами. Свежий месяц сверху.</div>
  </section>

  <!-- Leads section -->
  <section class="bg-white rounded-xl border border-slate-200 shadow-sm">
    <div class="p-3 sm:p-5 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div class="flex gap-1 text-sm overflow-x-auto -mx-3 px-3 sm:mx-0 sm:px-0">
        <button @click="setStatus('active')"   :class="leadFilter==='active'   ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600'" class="px-3 py-1.5 rounded-md font-medium whitespace-nowrap">Активные</button>
        <button @click="setStatus('clients')"  :class="leadFilter==='clients'  ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600'" class="px-3 py-1.5 rounded-md font-medium whitespace-nowrap">💚 Клиенты</button>
        <button @click="setStatus('ignoring')" :class="leadFilter==='ignoring' ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600'" class="px-3 py-1.5 rounded-md font-medium whitespace-nowrap">🤐 Игнорят</button>
        <button @click="setStatus('lost')"     :class="leadFilter==='lost'     ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600'" class="px-3 py-1.5 rounded-md font-medium whitespace-nowrap">Отвалы</button>
        <button @click="setStatus('all')"      :class="leadFilter==='all'      ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600'" class="px-3 py-1.5 rounded-md font-medium whitespace-nowrap">Все</button>
      </div>
      <input type="search" x-model.debounce.300ms="searchQuery" @input="loadLeads()" placeholder="Поиск…" class="w-full sm:flex-1 sm:min-w-[260px] px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>

    <div class="divide-y divide-slate-100 max-h-[60vh] sm:max-h-[600px] overflow-y-auto scroll-fade">
      <template x-if="leads.length === 0">
        <div class="p-8 text-center text-slate-400 text-sm">Лидов пока нет.</div>
      </template>
      <template x-for="lead in leads" :key="lead.id">
        <div @click="openLead(lead)" class="p-3 sm:p-4 hover:bg-slate-50 active:bg-slate-100 cursor-pointer flex items-start gap-2 sm:gap-4">
          <div class="text-slate-400 text-sm font-mono w-8 sm:w-12 shrink-0">#<span x-text="lead.id"></span></div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5 flex-wrap">
              <div class="font-medium text-sm sm:text-base truncate" x-text="lead.name || lead.username || 'Без имени'"></div>
              <span :class="'stage-' + lead.stage" class="px-2 py-0.5 rounded-md text-[10px] sm:text-xs font-medium" x-text="lead.stage_short"></span>
              <span :class="'source-' + lead.source" class="px-2 py-0.5 rounded-md text-[10px] sm:text-xs font-medium" x-text="lead.source_title"></span>
            </div>
            <div x-show="lead.username" class="text-slate-400 text-xs mt-0.5" x-text="lead.username"></div>
            <div x-show="lead.request" class="text-xs sm:text-sm text-slate-600 mt-1 line-clamp-2" x-text="lead.request"></div>
            <div x-show="lead.notes" class="text-xs text-slate-400 mt-1 truncate">📝 <span x-text="lead.notes"></span></div>
          </div>
          <div class="text-[10px] sm:text-xs text-slate-400 whitespace-nowrap shrink-0" x-text="formatDate(lead.updated_at)"></div>
        </div>
      </template>
    </div>
  </section>

</div>

<!-- Lead drawer -->
<div x-show="selectedLead" x-cloak @click.self="selectedLead=null" class="fixed inset-0 bg-slate-900/40 z-40 flex justify-end" x-transition.opacity>
  <div class="w-full sm:max-w-xl bg-white h-full shadow-2xl overflow-y-auto" x-show="selectedLead" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0">
    <template x-if="selectedLead">
      <div class="p-4 sm:p-6">
        <div class="flex items-start justify-between mb-4 gap-2">
          <div class="min-w-0 flex-1">
            <div class="text-slate-400 text-xs font-mono">Лид #<span x-text="selectedLead.id"></span></div>
            <h2 class="text-xl sm:text-2xl font-bold mt-1 break-words" x-text="selectedLead.name || selectedLead.username || 'Без имени'"></h2>
            <div class="flex gap-2 mt-2 flex-wrap">
              <span :class="'stage-' + selectedLead.stage" class="px-2 sm:px-3 py-0.5 sm:py-1 rounded-md text-xs sm:text-sm font-medium" x-text="selectedLead.stage_title"></span>
              <span :class="'source-' + selectedLead.source" class="px-2 sm:px-3 py-0.5 sm:py-1 rounded-md text-xs sm:text-sm font-medium" x-text="selectedLead.source_title"></span>
            </div>
          </div>
          <button @click="selectedLead=null" class="text-slate-400 hover:text-slate-700 p-1 shrink-0">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>

        <dl class="space-y-3 text-sm mb-6">
          <div x-show="selectedLead.username">
            <dt class="text-slate-400 text-xs uppercase tracking-wider">Логин</dt>
            <dd class="mt-0.5" x-text="selectedLead.username"></dd>
          </div>
          <div x-show="selectedLead.request">
            <dt class="text-slate-400 text-xs uppercase tracking-wider">Запрос</dt>
            <dd class="mt-0.5 whitespace-pre-wrap" x-text="selectedLead.request"></dd>
          </div>
          <div>
            <dt class="text-slate-400 text-xs uppercase tracking-wider">Заметка</dt>
            <textarea x-model="noteDraft" rows="3" class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Свободные заметки…"></textarea>
            <button @click="saveNote()" :disabled="noteDraft === (selectedLead.notes || '')" class="mt-1 text-xs px-3 py-1 rounded-md bg-slate-100 hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed">Сохранить заметку</button>
          </div>
          <div x-show="selectedLead.is_lost && selectedLead.lost_reason">
            <dt class="text-slate-400 text-xs uppercase tracking-wider">Причина отвала</dt>
            <dd class="mt-0.5" x-text="selectedLead.lost_reason"></dd>
          </div>
          <div class="grid grid-cols-2 gap-4 pt-2">
            <div>
              <dt class="text-slate-400 text-xs uppercase tracking-wider">Создан</dt>
              <dd class="mt-0.5" x-text="formatDate(selectedLead.created_at, true)"></dd>
            </div>
            <div>
              <dt class="text-slate-400 text-xs uppercase tracking-wider">Обновлён</dt>
              <dd class="mt-0.5" x-text="formatDate(selectedLead.updated_at, true)"></dd>
            </div>
          </div>
        </dl>

        <div class="space-y-2 pt-4 border-t border-slate-100">
          <button x-show="selectedLead.next_stage && !selectedLead.is_ignoring" @click="advance()" class="w-full px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium flex items-center justify-center gap-2">
            <span>→</span>
            <span x-text="selectedLead.next_stage_title"></span>
          </button>
          <button x-show="selectedLead.is_ignoring" @click="unignore()" class="w-full px-4 py-3 bg-amber-500 hover:bg-amber-600 text-white rounded-lg font-medium">
            ▶️ Снять «игнорит»
          </button>
          <button x-show="selectedLead.is_active" @click="ignore()" class="w-full px-4 py-3 bg-white border border-amber-200 text-amber-700 hover:bg-amber-50 rounded-lg font-medium">
            🤐 В «игнорит»
          </button>
          <button x-show="selectedLead.is_active" @click="markLost()" class="w-full px-4 py-3 bg-white border border-red-200 text-red-700 hover:bg-red-50 rounded-lg font-medium">
            ❌ Лид отвалился
          </button>
          <button x-show="selectedLead.is_lost" @click="revive()" class="w-full px-4 py-3 bg-white border border-blue-200 text-blue-700 hover:bg-blue-50 rounded-lg font-medium">
            ↩︎ Вернуть в работу (Квал)
          </button>
          <button @click="deleteLead()" class="w-full px-4 py-2 mt-2 text-slate-500 hover:text-red-700 text-sm font-medium">
            🗑 Удалить лид навсегда
          </button>
        </div>
      </div>
    </template>
  </div>
</div>

<!-- New lead modal -->
<div x-show="newLeadOpen" x-cloak @click.self="newLeadOpen=false" class="fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-bold">Новый лид</h2>
      <button @click="newLeadOpen=false" class="text-slate-400 hover:text-slate-700">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="text-xs uppercase tracking-wider text-slate-500 font-medium">Источник</label>
        <div class="grid grid-cols-3 gap-2 mt-1">
          <template x-for="src in sources" :key="src.code">
            <button @click="newLead.source = src.code"
                    :class="newLead.source === src.code ? 'bg-blue-600 text-white border-blue-600' : 'bg-white border-slate-200 hover:bg-slate-50'"
                    class="px-3 py-2 border rounded-lg text-sm font-medium" x-text="src.title"></button>
          </template>
        </div>
      </div>
      <div>
        <label class="text-xs uppercase tracking-wider text-slate-500 font-medium">Имя</label>
        <input x-model="newLead.name" class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Например, Анна"/>
      </div>
      <div>
        <label class="text-xs uppercase tracking-wider text-slate-500 font-medium">Логин</label>
        <input x-model="newLead.username" class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="@username"/>
      </div>
      <div>
        <label class="text-xs uppercase tracking-wider text-slate-500 font-medium">Запрос / боль</label>
        <textarea x-model="newLead.request" rows="3" class="mt-1 w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="С чем пришёл человек"></textarea>
      </div>
      <div class="flex gap-2 pt-2">
        <button @click="newLeadOpen=false" class="flex-1 px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-medium">Отмена</button>
        <button @click="createLead()" :disabled="!newLead.source"
                class="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white rounded-lg text-sm font-medium">Создать</button>
      </div>
    </div>
  </div>
</div>

<script>
function dash() {
  return {
    summary: null,
    funnel: { stages: [], lost: 0 },
    channels: [],
    months: [],
    period: 'now',
    periodData: null,
    leads: [],
    leadFilter: 'active',
    searchQuery: '',
    selectedLead: null,
    noteDraft: '',
    sources: [],
    newLeadOpen: false,
    newLead: { source: '', name: '', username: '', request: '' },
    channelsChart: null,

    get todayLabel() {
      const d = new Date();
      return d.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    },

    get periodLabel() {
      if (this.period === 'now') {
        const total = (this.funnel.stages || []).reduce((a, s) => a + (s.count || 0), 0);
        return 'Где лежат активные лиды прямо сейчас · всего ' + total + '. Это распределение, не воронка движения — для конверсий смотри День/Неделю/Месяц.';
      }
      if (this.periodData) return 'События за период: ' + this.periodData.label + ' · % — конверсия от первого этапа';
      return '';
    },

    get funnelHasData() {
      return (this.funnel.stages || []).some(s => s.count > 0);
    },

    get channelsHaveData() {
      return (this.channels || []).some(c => c.leads > 0);
    },

    get summaryCards() {
      if (!this.summary) return [];
      const weekLeads = this.summary.week.lead_new || 0;
      const monthPayments = this.summary.month_payments || 0;
      const monthRevenue = this.summary.month_revenue || 0;
      const avgCheck = this.summary.month_avg_check || 0;
      return [
        { label: 'Заявок за неделю', value: weekLeads,
          hint: 'с понедельника', color: 'text-blue-600' },
        { label: 'Оплат за месяц', value: monthPayments,
          hint: monthPayments ? 'клиентов: ' + this.summary.total_clients : 'пока нет', color: 'text-emerald-600' },
        { label: 'Выручка за месяц', value: this.formatMoney(monthRevenue),
          hint: 'first + repeat', color: 'text-emerald-700' },
        { label: 'Средний чек', value: this.formatMoney(avgCheck),
          hint: monthPayments ? 'за ' + monthPayments + ' оплат' : '—', color: 'text-slate-900' },
      ];
    },

    async init() {
      const r = await fetch('/api/stages');
      const d = await r.json();
      this.sources = d.sources;
      await this.refreshAll();
    },

    async refreshAll() {
      await Promise.all([this.loadSummary(), this.loadChannels(), this.loadLeads(), this.loadFunnelByPeriod(), this.loadMonths()]);
    },

    async loadMonths() {
      const r = await fetch('/api/months');
      const d = await r.json();
      this.months = d.months || [];
    },

    formatMoney(amount) {
      if (!amount) return '—';
      return Math.round(amount).toLocaleString('ru-RU') + ' ₽';
    },

    async loadSummary() {
      const r = await fetch('/api/summary');
      this.summary = await r.json();
    },

    async loadChannels() {
      const r = await fetch('/api/channels');
      const d = await r.json();
      this.channels = d.channels;
      this.$nextTick(() => this.renderChannelsChart());
    },

    async loadLeads() {
      const url = '/api/leads?status=' + this.leadFilter + '&q=' + encodeURIComponent(this.searchQuery);
      const r = await fetch(url);
      const d = await r.json();
      this.leads = d.leads;
    },

    async loadFunnelByPeriod() {
      if (this.period === 'now') {
        const r = await fetch('/api/funnel');
        const d = await r.json();
        this.funnel = d;
        this.periodData = null;
      } else {
        const r = await fetch('/api/period/' + this.period);
        const d = await r.json();
        this.funnel = { stages: d.stages, lost: 0 };
        this.periodData = d;
      }
    },

    setPeriod(p) {
      this.period = p;
      this.loadFunnelByPeriod();
    },

    setStatus(s) {
      this.leadFilter = s;
      this.loadLeads();
    },

    get funnelView() {
      // Реактивная воронка из CSS-блоков. Каждая строка — этап, ширина = % от верха.
      // Цвета — от голубого до зелёного, повторяет градацию этапов.
      const colors = ['#60a5fa', '#3b82f6', '#fbbf24', '#f59e0b', '#34d399', '#10b981', '#059669'];
      const stages = this.funnel.stages || [];
      const data = stages.map(s => s.count || 0);
      const top = data[0] || 0;
      const totalActive = data.reduce((a, b) => a + b, 0);
      const isSnapshot = this.period === 'now';
      const minWidth = 22; // даже пустые этапы видны контуром
      return stages.map((s, i) => {
        const count = data[i];
        let width, label, tooltip;
        if (isSnapshot) {
          // Снапшот — доля от всех активных
          const pct = totalActive > 0 ? Math.round(count / totalActive * 100) : 0;
          // Ширина пропорциональна количеству, но минимум видим
          const maxCount = Math.max(...data, 1);
          width = Math.max(minWidth, Math.round(count / maxCount * 100));
          label = totalActive > 0 ? pct + '%' : '';
          tooltip = count + ' лидов сейчас на этапе «' + s.title + '»' +
                    (totalActive > 0 ? ' (' + pct + '% от всех активных)' : '');
        } else {
          // Период — конверсия от верха воронки
          const pct = top > 0 ? Math.round(count / top * 100) : 0;
          width = top > 0 ? Math.max(minWidth, pct) : minWidth;
          if (i === 0) {
            label = '100%';
            tooltip = count + ' заявок за период';
          } else {
            const prev = data[i - 1];
            const prevPct = prev > 0 ? Math.round(count / prev * 100) : 0;
            label = pct + '%';
            tooltip = count + ' · ' + pct + '% от верха · ' + prevPct + '% от прошлого';
          }
        }
        return {
          code: s.code,
          short: s.short,
          title: s.title,
          count,
          width,
          label,
          color: count === 0 ? '#f1f5f9' : colors[i % colors.length],
          tooltip,
        };
      });
    },

    renderChannelsChart() {
      const ctx = document.getElementById('channelsChart');
      if (!ctx) return;
      // Только каналы с заявками, иначе график пустой и зияет
      const filtered = (this.channels || []).filter(c => c.leads > 0);
      const labels = filtered.map(c => c.title);
      const data = filtered.map(c => c.leads);
      const palette = ['#ec4899', '#ef4444', '#3b82f6', '#1f2937', '#a855f7', '#0ea5e9'];
      if (this.channelsChart) this.channelsChart.destroy();
      if (!data.length) return;
      this.channelsChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: palette.slice(0, data.length), borderWidth: 0 }] },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          animation: false,
          plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 12 } } }
        }
      });
    },

    openLead(lead) {
      this.selectedLead = lead;
      this.noteDraft = lead.notes || '';
    },

    async advance() {
      const r = await fetch('/api/leads/' + this.selectedLead.id + '/advance', { method: 'POST' });
      const d = await r.json();
      if (d.lead) { this.selectedLead = d.lead; this.noteDraft = d.lead.notes || ''; }
      await this.refreshAll();
    },

    async markLost() {
      const reason = prompt('Причина отвала (можно оставить пустым):', '');
      if (reason === null) return;
      const r = await fetch('/api/leads/' + this.selectedLead.id + '/lost', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason })
      });
      const d = await r.json();
      if (d.lead) { this.selectedLead = d.lead; }
      await this.refreshAll();
    },

    async revive() {
      const r = await fetch('/api/leads/' + this.selectedLead.id + '/revive', { method: 'POST' });
      const d = await r.json();
      if (d.lead) { this.selectedLead = d.lead; }
      await this.refreshAll();
    },

    async ignore() {
      const r = await fetch('/api/leads/' + this.selectedLead.id + '/ignore', { method: 'POST' });
      const d = await r.json();
      if (d.lead) { this.selectedLead = d.lead; }
      await this.refreshAll();
    },

    async unignore() {
      const r = await fetch('/api/leads/' + this.selectedLead.id + '/unignore', { method: 'POST' });
      const d = await r.json();
      if (d.lead) { this.selectedLead = d.lead; }
      await this.refreshAll();
    },

    async deleteLead() {
      const title = this.selectedLead.name || this.selectedLead.username || ('#' + this.selectedLead.id);
      if (!confirm('Удалить лид «' + title + '» навсегда? Восстановить будет нельзя.')) return;
      await fetch('/api/leads/' + this.selectedLead.id, { method: 'DELETE' });
      this.selectedLead = null;
      await this.refreshAll();
    },

    async saveNote() {
      const r = await fetch('/api/leads/' + this.selectedLead.id + '/note', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ notes: this.noteDraft })
      });
      const d = await r.json();
      if (d.lead) { this.selectedLead = d.lead; }
      await this.loadLeads();
    },

    async createLead() {
      if (!this.newLead.source) return;
      const r = await fetch('/api/leads', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(this.newLead)
      });
      const d = await r.json();
      this.newLead = { source: '', name: '', username: '', request: '' };
      this.newLeadOpen = false;
      await this.refreshAll();
      if (d.lead) this.openLead(d.lead);
    },

    formatDate(iso, withYear = false) {
      if (!iso) return '';
      const d = new Date(iso);
      const opts = withYear
        ? { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }
        : { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' };
      return d.toLocaleString('ru-RU', opts);
    }
  }
}
</script>
