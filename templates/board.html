<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Канбан — Бизнес-показатели</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; }
  /* Источники — те же цвета что на главной */
  .source-instagram { background: #fce4ec; color: #c2185b; }
  .source-youtube   { background: #ffebee; color: #d32f2f; }
  .source-telegram  { background: #e3f2fd; color: #1565c0; }
  .source-tiktok    { background: #e8eaf6; color: #1a1a1a; }
  .source-rutube    { background: #f3e5f5; color: #6a1b9a; }
  .source-vk        { background: #e1f5fe; color: #0277bd; }
  .source-unknown   { background: #f1f5f9; color: #475569; }

  /* Колонки */
  .board { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
  .col { flex: 0 0 280px; background: #f8fafc; border-radius: 10px; padding: 10px; }
  .col-h { font-weight: 600; font-size: 13px; color: #334155;
           display: flex; justify-content: space-between; align-items: center;
           margin-bottom: 8px; padding: 0 2px; }
  .col-h .count { background: #e2e8f0; color: #475569;
                  border-radius: 999px; padding: 1px 8px; font-size: 11px;
                  font-variant-numeric: tabular-nums; }

  /* Карточка */
  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
          padding: 10px; margin-bottom: 8px; cursor: grab; box-shadow: 0 1px 2px rgba(0,0,0,.04);
          transition: box-shadow .15s, border-color .15s; }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); border-color: #cbd5e1; }
  .card.sortable-ghost { opacity: .4; }
  .card.sortable-chosen { cursor: grabbing; }
  .card.stale { border-left: 3px solid #f59e0b; }
  .card.very-stale { border-left: 3px solid #ef4444; }

  .card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-name { font-weight: 600; font-size: 14px; color: #0f172a;
               line-height: 1.2; word-break: break-word; }
  .card-id { font-size: 11px; color: #94a3b8; font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .src-chip { display: inline-block; font-size: 11px; padding: 2px 7px;
              border-radius: 4px; margin-top: 6px; }
  .links { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .link-btn { font-size: 12px; padding: 3px 8px; border-radius: 4px;
              background: #e2e8f0; color: #334155; text-decoration: none;
              transition: background .15s; }
  .link-btn:hover { background: #cbd5e1; }
  .link-btn.tg { background: #dbeafe; color: #1d4ed8; }
  .link-btn.tg:hover { background: #bfdbfe; }
  .card-meta { font-size: 11px; color: #64748b; margin-top: 6px;
               display: flex; justify-content: space-between; }
  .card-req { font-size: 12px; color: #475569; margin-top: 6px;
              max-height: 3.2em; overflow: hidden; text-overflow: ellipsis;
              display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  .toast { position: fixed; bottom: 20px; right: 20px;
           background: #0f172a; color: #fff; padding: 10px 16px;
           border-radius: 6px; font-size: 13px;
           transform: translateY(80px); opacity: 0; transition: all .2s; z-index: 100; }
  .toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body class="bg-slate-50 text-slate-800">

<div x-data="board()" x-init="init()" class="px-3 sm:px-6 py-4">

  <div class="flex justify-between items-center mb-4">
    <div>
      <h1 class="text-xl sm:text-2xl font-bold">🗂 Канбан</h1>
      <div class="text-xs text-slate-500" x-text="updatedHint"></div>
    </div>
    <div class="flex gap-2">
      <select x-model="sourceFilter" @change="render()"
              class="text-sm border border-slate-300 rounded px-2 py-1 bg-white">
        <option value="all">Все источники</option>
        <template x-for="s in sources" :key="s.code">
          <option :value="s.code" x-text="s.title"></option>
        </template>
      </select>
      <button @click="load()"
              class="text-sm bg-white border border-slate-300 rounded px-3 py-1 hover:bg-slate-50">
        ↻ Обновить
      </button>
      <a href="/" class="text-sm bg-white border border-slate-300 rounded px-3 py-1 hover:bg-slate-50">
        ← Дашборд
      </a>
    </div>
  </div>

  <div class="board" x-ref="board">
    <template x-for="col in columns" :key="col.code">
      <div class="col">
        <div class="col-h">
          <span x-text="col.title"></span>
          <span class="count" x-text="filteredLeads(col).length"></span>
        </div>
        <div class="col-body" :data-stage="col.code" x-ref="colBody">
          <template x-for="lead in filteredLeads(col)" :key="lead.id">
            <div class="card" :data-lead-id="lead.id" :class="cardClass(lead)">
              <div class="card-row">
                <div class="card-name" x-text="lead.name || lead.username || '—'"></div>
                <div class="card-id" x-text="'#' + lead.id"></div>
              </div>
              <span class="src-chip" :class="'source-' + lead.source"
                    x-text="lead.source_title"></span>
              <div class="links">
                <template x-if="lead.username">
                  <a class="link-btn tg"
                     :href="'https://t.me/' + lead.username.replace('@','')"
                     target="_blank" rel="noopener" @click.stop>
                    📱 <span x-text="lead.username"></span>
                  </a>
                </template>
                <template x-if="!lead.username">
                  <span class="link-btn" style="opacity:.5">нет username</span>
                </template>
              </div>
              <div x-show="lead.request" class="card-req" x-text="lead.request"></div>
              <div class="card-meta">
                <span x-text="'обновлён ' + daysAgo(lead.updated_at) + ' назад'"></span>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>

  <div class="toast" :class="{show: toastMsg}" x-text="toastMsg"></div>
</div>

<script>
function board() {
  return {
    columns: [],
    sources: [],
    sourceFilter: 'all',
    toastMsg: '',
    toastTimer: null,
    updatedHint: '',
    sortables: [],

    async init() {
      // Загрузка справочника источников + первая загрузка доски
      const sr = await fetch('/api/stages');
      const sd = await sr.json();
      this.sources = sd.sources || [];
      await this.load();
      // Авто-обновление раз в 60 сек — на случай если бот двинул лид
      setInterval(() => this.load(), 60_000);
    },

    async load() {
      const r = await fetch('/api/board');
      const d = await r.json();
      this.columns = d.columns;
      this.updatedHint = 'обновлено ' + new Date().toLocaleTimeString('ru-RU').slice(0,5);
      // Перевешиваем SortableJS на новые DOM-узлы
      this.$nextTick(() => this.attachSortables());
    },

    attachSortables() {
      // Снимаем старые экземпляры
      this.sortables.forEach(s => s.destroy());
      this.sortables = [];
      const bodies = this.$refs.board.querySelectorAll('.col-body');
      bodies.forEach(body => {
        const s = Sortable.create(body, {
          group: 'leads',
          animation: 150,
          ghostClass: 'sortable-ghost',
          chosenClass: 'sortable-chosen',
          onEnd: async (evt) => {
            const leadId = evt.item.dataset.leadId;
            const newStage = evt.to.dataset.stage;
            const oldStage = evt.from.dataset.stage;
            if (newStage === oldStage) return;
            await this.moveLead(leadId, newStage);
          }
        });
        this.sortables.push(s);
      });
    },

    async moveLead(leadId, stage) {
      try {
        const r = await fetch(`/api/leads/${leadId}/move`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({stage})
        });
        if (!r.ok) {
          const err = await r.json();
          throw new Error(err.error || 'http ' + r.status);
        }
        this.showToast('✅ Перемещено');
        // Не перезагружаем — DOM уже двинут SortableJS. Лишний load дёрнет
        // карточку обратно если ответ ещё в пути, поэтому ждём 2с потом sync.
        setTimeout(() => this.load(), 2000);
      } catch (e) {
        this.showToast('⚠ Ошибка: ' + e.message);
        // Откатываем перенос — перезагружаем доску с правильными данными
        this.load();
      }
    },

    filteredLeads(col) {
      if (this.sourceFilter === 'all') return col.leads;
      return col.leads.filter(l => l.source === this.sourceFilter);
    },

    render() {
      // Пересчитываем visible списки через filteredLeads — Alpine сделает сам
      // Никаких прямых DOM-операций. Но Sortable надо переподписать на новый DOM.
      this.$nextTick(() => this.attachSortables());
    },

    daysAgo(isoTs) {
      const d = new Date(isoTs);
      const days = Math.floor((Date.now() - d.getTime()) / 86400000);
      if (days < 1) return 'сегодня';
      if (days === 1) return '1 день';
      if (days < 5) return days + ' дня';
      return days + ' дней';
    },

    cardClass(lead) {
      const days = Math.floor((Date.now() - new Date(lead.updated_at).getTime()) / 86400000);
      if (days >= 14) return 'very-stale';
      if (days >= 7) return 'stale';
      return '';
    },

    showToast(msg) {
      this.toastMsg = msg;
      if (this.toastTimer) clearTimeout(this.toastTimer);
      this.toastTimer = setTimeout(() => this.toastMsg = '', 2500);
    }
  };
}
</script>
</body>
</html>
